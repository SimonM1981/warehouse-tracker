<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: system-ui, sans-serif; }
        .nav-tabs .nav-link { font-weight: 600; color: #495057; border: none; padding: 12px 20px; }
        .nav-tabs .nav-link.active { border-bottom: 4px solid #0d6efd; color: #0d6efd; background: transparent; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .info-header { background: #e9ecef; border-radius: 6px; padding: 15px; margin-bottom: 20px; border-left: 5px solid #0d6efd; }
        .status-badge { font-size: 0.9rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📦 Order Tracking App</h2>
        <button id="refreshBtn" class="btn btn-outline-primary" onclick="fetchData()">🔄 Sync Data</button>
    </div>

    <ul class="nav nav-tabs mb-4" id="deptTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" onclick="switchDept('Store')">🏪 Store</button></li>
        <li class="nav-item"><button class="nav-link" onclick="switchDept('Laser')">⚡ Laser</button></li>
        <li class="nav-item"><button class="nav-link" onclick="switchDept('Packing')">📦 Packing</button></li>
        <li class="nav-item"><button class="nav-link" onclick="switchDept('QC')">🔬 QC / Incoming</button></li>
    </ul>

    <div class="card p-3 mb-4">
        <label for="orderSelector" class="form-label fw-bold">Select Active P/I No. & Part Number:</label>
        <select id="orderSelector" class="form-select form-select-lg" onchange="onOrderSelect()">
            <option value="">-- Choose Item for Full Processing Info --</option>
        </select>
    </div>

    <div id="infoDisplay" class="card p-4 d-none">
        <div class="info-header">
            <h4 class="mb-2">📋 Full Order Specifications</h4>
            <div class="row g-3">
                <div class="col-md-4"><strong>Customer Name:</strong> <span id="lblCustomer"></span></div>
                <div class="col-md-4"><strong>P/I Number:</strong> <span id="lblPI"></span></div>
                <div class="col-md-4"><strong>Part Number:</strong> <span id="lblPart"></span></div>
                <div class="col-md-4"><strong>Customer No:</strong> <span id="lblCustNo"></span></div>
                <div class="col-md-4"><strong>Target Qty Order:</strong> <span id="lblOrderQty" class="badge bg-dark fs-6"></span> <span id="lblUnit"></span></div>
                <div class="col-md-4"><strong>Line Status:</strong> <span id="lblStatus" class="status-badge bg-warning text-dark"></span></div>
            </div>
        </div>

        <h5 class="mt-4 mb-3">⏱️ Fulfillment Pipeline Breakdown</h5>
        <div class="row text-center mb-4 g-2">
            <div class="col-md-3"><div class="p-3 bg-light border rounded"><h6>Collected (Store)</h6><h3 id="statStore">0</h3></div></div>
            <div class="col-md-3"><div class="p-3 bg-light border rounded"><h6>Laser Processed</h6><h3 id="statLaser">0</h3></div></div>
            <div class="col-md-3"><div class="p-3 bg-light border rounded"><h6>Packed Quantity</h6><h3 id="statPacking">0</h3></div></div>
            <div class="col-md-3"><div class="p-3 bg-light border rounded"><h6>QC / Incoming Injected</h6><h3 id="statQC">0</h3></div></div>
        </div>

        <div class="border-top pt-4">
            <h5 id="formTitle">Perform Actions</h5>
            <form id="actionForm" onsubmit="submitForm(event)" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Action Quantity</label>
                    <input type="number" id="inputQty" class="form-control" required min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Operator Name</label>
                    <input type="text" id="inputOperator" class="form-control" required>
                </div>
                
                <div class="col-md-3 field-standard">
                    <label class="form-label fw-bold">Box ID</label>
                    <input type="text" id="inputBox" class="form-control">
                </div>
                <div class="col-md-3 field-standard">
                    <label class="form-label fw-bold">Pallet No.</label>
                    <input type="text" id="inputPallet" class="form-control">
                </div>
                <div class="col-md-3 field-qc d-none">
                    <label class="form-label fw-bold">Received FROM</label>
                    <input type="text" id="inputReceivedFrom" class="form-control">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Remark / Adjustments</label>
                    <input type="text" id="inputRemark" class="form-control" placeholder="Optional notes regarding incremental run">
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg w-100">Save Transaction entry</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Paste your Web App Link generated from Google Apps Script below
    const API_URL = "https://script.google.com/macros/s/AKfycbyXLp6sCHhAFbJpfRrGsAlfs_M4gMmpKV8ROMxx0ruaRs6aLqHKiC-bJbs_eVlbJvI5sA/exec"; 
    let currentDept = "Store";
    let globalOrdersCache = [];
    let selectedIndex = null;

    window.onload = function() {
        fetchData();
    };

    function switchDept(dept) {
        currentDept = dept;
        document.querySelectorAll('#deptTabs button').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(dept)) btn.classList.add('active');
        });
        
        // Dynamically shift form labels to suit specific workflows
        document.getElementById('formTitle').innerText = `Submit Incremental ${dept} Batch Record`;
        
        if(dept === 'QC') {
            document.querySelectorAll('.field-standard').forEach(el => el.classList.add('d-none'));
            document.querySelectorAll('.field-qc').forEach(el => el.classList.remove('d-none'));
        } else {
            document.querySelectorAll('.field-standard').forEach(el => el.classList.remove('d-none'));
            document.querySelectorAll('.field-qc').forEach(el => el.classList.add('d-none'));
        }
    }

    function fetchData() {
        const refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.innerText = "⏳ Loading...";
        refreshBtn.disabled = true;

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getOrders' })
        })
        .then(res => res.json())
        .then(response => {
            if(response.status === 'success') {
                globalOrdersCache = response.orders;
                populateSelector();
                if(selectedIndex !== null) onOrderSelect();
            } else {
                alert("Error loading data: " + response.message);
            }
        })
        .catch(err => alert("Connection error: " + err))
        .finally(() => {
            refreshBtn.innerText = "🔄 Sync Data";
            refreshBtn.disabled = false;
        });
    }

    function populateSelector() {
        const selector = document.getElementById('orderSelector');
        const currentVal = selector.value;
        selector.innerHTML = '<option value="">-- Choose Item for Full Processing Info --</option>';
        
        globalOrdersCache.forEach((order, index) => {
            const option = document.createElement('option');
            option.value = index;
            // Full primary context identifier
            option.innerText = `[${order.piNo}] ${order.customerName} - Part: ${order.partNumber} (Order Qty: ${order.qtyOrder})`;
            selector.appendChild(option);
        });

        if(currentVal !== "") selector.value = currentVal;
    }

    function onOrderSelect() {
        const selector = document.getElementById('orderSelector');
        if(!selector.value) {
            document.getElementById('infoDisplay').classList.add('d-none');
            return;
        }
        
        selectedIndex = selector.value;
        const item = globalOrdersCache[selectedIndex];

        // Fill full layout info elements
        document.getElementById('lblCustomer').innerText = item.customerName;
        document.getElementById('lblPI').innerText = item.piNo;
        document.getElementById('lblPart').innerText = item.partNumber;
        document.getElementById('lblCustNo').innerText = item.customerNo;
        document.getElementById('lblOrderQty').innerText = item.qtyOrder;
        document.getElementById('lblUnit').innerText = item.unit;
        document.getElementById('lblStatus').innerText = item.currentStatus;

        // Metric calculations aggregated by server logs
        document.getElementById('statStore').innerText = item.qtyCollected;
        document.getElementById('statLaser').innerText = item.qtyLaser;
        document.getElementById('statPacking').innerText = item.qtyPacked;
        document.getElementById('statQC').innerText = item.qtyQC;

        document.getElementById('infoDisplay').classList.remove('d-none');
    }

    function submitForm(e) {
        e.preventDefault();
        const item = globalOrdersCache[selectedIndex];
        
        const payload = {
            action: 'saveTransaction',
            data: {
                piNo: item.piNo,
                partNumber: item.partNumber,
                department: currentDept,
                actionType: currentDept === 'QC' ? 'Received' : 'Processed',
                qty: document.getElementById('inputQty').value,
                operatorName: document.getElementById('inputOperator').value,
                boxId: document.getElementById('inputBox').value,
                palletNo: document.getElementById('inputPallet').value,
                receivedFrom: document.getElementById('inputReceivedFrom').value,
                remark: document.getElementById('inputRemark').value
            }
        };

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === 'success') {
                // Clear fields safely upon incremental save success
                document.getElementById('inputQty').value = '';
                document.getElementById('inputBox').value = '';
                document.getElementById('inputPallet').value = '';
                document.getElementById('inputRemark').value = '';
                fetchData(); // Instantly update progress display matrix numbers
            } else {
                alert("Submission failed: " + res.message);
            }
        });
    }
</script>
</body>
</html>
