<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MG Warehouse - Multi-User Traceability</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root { --primary: #1976d2; --success: #2e7d32; --danger: #d32f2f; --bg: #f4f7f6; --excel: #1d6f42; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 30px; }
       
        .staff-header { background: #2196f3; color: white; padding: 10px; position: sticky; top: 0; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .staff-header label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
        #staff-name { width: 100%; padding: 10px; border-radius: 4px; border: none; font-size: 1rem; font-weight: bold; box-sizing: border-box; }

        .tabs { display: flex; background: #fff; position: sticky; top: 72px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: #666; cursor: pointer; border-bottom: 3px solid transparent; font-size: 0.8rem; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
       
        .page { display: none; padding: 15px; max-width: 600px; margin: auto; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; align-items: flex-end; margin-top: 10px; }
        .input-field { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; width: 100%; }
        .scan-inline-btn { width: 50px; height: 45px; background: #eee; color: #333; border: 1px solid #ccc; border-radius: 6px; font-size: 20px; cursor: pointer; }
       
        label { display: block; font-weight: 600; color: #444; font-size: 0.75rem; text-transform: uppercase; margin-top: 10px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; padding: 12px; border-radius: 6px; width: 100%; }
        .save-btn { background: var(--success); margin-top: 25px; font-size: 1.1rem; }
        #reader { width: 100%; margin-top: 15px; border-radius: 8px; overflow: hidden; background: #000; display: none; }
       
        .item-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 8px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .timeline { margin: 15px 0; padding-left: 10px; border-left: 2px dashed #ddd; }
        .timeline-item { position: relative; padding-bottom: 10px; padding-left: 20px; font-size: 0.75rem; }
        .timeline-item::before { content: ''; position: absolute; left: -6px; top: 2px; width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .timeline-item.done::before { background: var(--primary); }
        .staff-badge { background: #e3f2fd; color: #1565c0; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .log-meta { color: #888; font-style: italic; font-size: 0.65rem; }
       
        .edit-row { margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .delete-link { color: var(--danger); font-size: 0.7rem; text-decoration: underline; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="staff-header">
    <label>Worker Name (type freely)</label>
    <input id="staff-name" type="text" placeholder="Your name...">
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showPage('scan-page', this)">SCAN</button>
    <button class="tab-btn" onclick="showPage('list-page', this)">DATABASE</button>
    <button class="tab-btn" onclick="showPage('search-page', this)">TRACE</button>
</div>

<div id="scan-page" class="page active">
    <div class="card">
        <h3>New Entry</h3>
        <button onclick="resetFields()" style="background:#78909c; margin-bottom:10px; font-size:0.7rem; width:auto; padding:5px 10px;">Clear Fields</button>
        <div id="reader"></div>
        <button id="stopBtn" onclick="stopScanner()" style="display:none; background:var(--danger); margin: 10px 0;">Cancel Scan</button>
       
        <label>Customer</label>
        <div class="input-group"><input id="customer" class="input-field"><button class="scan-inline-btn" onclick="startScanner('customer')">📷</button></div>
       
        <label>PI</label>
        <div class="input-group"><input id="pi" class="input-field"><button class="scan-inline-btn" onclick="startScanner('pi')">📷</button></div>
       
        <label>Part Number</label>
        <div class="input-group"><input id="part" class="input-field"><button class="scan-inline-btn" onclick="startScanner('part')">📷</button></div>
       
        <label>Qty</label>
        <input id="qty" type="number" class="input-field">
       
        <label>Box ID</label>
        <div class="input-group">
            <input id="ppbox" class="input-field" readonly style="background:#eee">
            <button class="scan-inline-btn" style="background:var(--primary); color:white" onclick="startScanner('ppbox')">📷</button>
        </div>

        <label>Pallet No.</label>
        <div class="input-group">
            <input id="pallet" class="input-field" placeholder="Pallet number (optional)">
            <button class="scan-inline-btn" onclick="startScanner('pallet')">📷</button>
        </div>
       
        <label>Initial Stage</label>
        <select id="status" class="input-field">
            <option value="Store">Store</option>
            <option value="Laser">Laser</option>
            <option value="Packing">Packing</option>
        </select>
       
        <button class="save-btn" onclick="saveRecord()">SAVE RECORD</button>
    </div>
</div>

<div id="list-page" class="page">
    <button class="save-btn" style="background:var(--excel); margin-bottom:15px; margin-top:0;" onclick="exportToExcel()">📥 EXCEL DOWNLOAD</button>
    <div id="full-database"></div>
</div>

<div id="search-page" class="page">
    <div class="card"><label>Search Part Trace</label><input id="searchInput" class="input-field" onkeyup="searchByPart()" placeholder="Part #..."></div>
    <div id="search-results"></div>
</div>

<script>
    let html5QrCode;
    let records = JSON.parse(localStorage.getItem("warehouse_db_v8") || "[]"); // changed key so old data doesn't conflict
    const scanSequence = ['customer', 'pi', 'part', 'ppbox', 'pallet']; // added pallet

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if (pageId === 'list-page') renderList(records, "full-database");
    }

    async function startScanner(targetId) {
        document.getElementById("reader").style.display = "block";
        document.getElementById("stopBtn").style.display = "block";
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        try {
            if (html5QrCode.isScanning) await html5QrCode.stop();
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById(targetId).value = text;
                const nextIdx = scanSequence.indexOf(targetId) + 1;
                if (nextIdx < scanSequence.length) {
                    setTimeout(() => startScanner(scanSequence[nextIdx]), 300);
                } else {
                    stopScanner();
                    document.getElementById("qty").focus();
                }
            });
        } catch (err) {}
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById("reader").style.display = "none";
                document.getElementById("stopBtn").style.display = "none";
            });
        }
    }

    function saveRecord() {
        const staff = document.getElementById("staff-name").value.trim();
        if (!staff) return alert("Please type your name at the top!");

        const initStatus = document.getElementById("status").value;
        const now = new Date().toLocaleString('en-GB');

        const item = {
            id: Date.now(),
            cust: document.getElementById("customer").value || "N/A",
            pi: document.getElementById("pi").value || "N/A",
            part: document.getElementById("part").value.trim(),
            qty: Number(document.getElementById("qty").value) || 0,
            box: document.getElementById("ppbox").value.trim(),
            pallet: document.getElementById("pallet").value.trim() || "—",
            status: initStatus,
            date: now,
            history: { [initStatus]: { staff: staff, time: now } }
        };

        if (!item.part || !item.box) return alert("Missing Part # or Box ID");

        records.unshift(item);
        localStorage.setItem("warehouse_db_v8", JSON.stringify(records));

        // Clear only the variable fields — keep name & pallet (common in many warehouses)
        ['customer','pi','part','qty','ppbox'].forEach(id => document.getElementById(id).value = "");

        alert("Saved by " + staff);
    }

    function renderList(dataArray, targetId) {
        const container = document.getElementById(targetId);
        container.innerHTML = dataArray.map(r => {
            const stages = ['Store', 'Laser', 'Packing', 'Shipped'];
            let timeline = stages.map(s => {
                const log = r.history[s];
                return `<div class="timeline-item ${log ? 'done' : ''}">
                    <strong>${s}</strong>: ${
                        log
                            ? `<span class="staff-badge">${log.staff}</span><br><span class="log-meta">${log.time}</span>`
                            : 'Waiting'
                    }
                </div>`;
            }).join('');

            const currentStatus = r.status || 'Store';

            return `<div class="item-card">
                <strong>${r.part}</strong>
                <span class="delete-link" onclick="deleteItem(${r.id})">Delete</span>
                <div style="font-size:0.75rem; margin:4px 0 8px;">
                    Box: ${r.box} • Pallet: ${r.pallet || '—'} • PI: ${r.pi}
                </div>
               
                <div class="timeline">${timeline}</div>

                <div class="edit-row">
                    <div>
                        <label style="font-size:0.7rem; margin-bottom:4px; display:block; color:#555;">Status</label>
                        <select id="status-${r.id}" class="input-field">
                            <option value="Store"   ${currentStatus==='Store'?'selected':''}>Store</option>
                            <option value="Laser"   ${currentStatus==='Laser'?'selected':''}>Laser</option>
                            <option value="Packing" ${currentStatus==='Packing'?'selected':''}>Packing</option>
                            <option value="Shipped" ${currentStatus==='Shipped'?'selected':''}>Shipped</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.7rem; margin-bottom:4px; display:block; color:#555;">Responsible Staff</label>
                        <input type="text" id="staff-${r.id}"
                               class="input-field"
                               placeholder="Type name here..."
                               value="">
                    </div>
                </div>

                <button onclick="saveStatusUpdate(${r.id})"
                        class="save-btn"
                        style="margin-top:12px; font-size:0.95rem; padding:10px;">
                    SAVE STATUS + STAFF
                </button>
            </div>`;
        }).join('');
    }

    function saveStatusUpdate(id) {
        const staffName = document.getElementById("staff-name").value.trim();
        if (!staffName) {
            alert("Please type your name at the top first!");
            document.getElementById("staff-name").focus();
            return;
        }

        const statusEl = document.getElementById(`status-${id}`);
        const staffEl  = document.getElementById(`staff-${id}`);

        const newStatus = statusEl.value;
        const typedStaff = staffEl.value.trim() || staffName; // fallback to top name if empty

        const now = new Date().toLocaleString('en-GB');

        records = records.map(r => {
            if (r.id === id) {
                if (!r.history[newStatus]) {
                    r.history[newStatus] = { staff: typedStaff, time: now };
                }
                r.status = newStatus;
            }
            return r;
        });

        localStorage.setItem("warehouse_db_v8", JSON.stringify(records));
        renderList(records, "full-database");
        alert(`Updated → ${newStatus} by ${typedStaff}`);
    }

    function deleteItem(id) {
        if (confirm("Delete this record?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem("warehouse_db_v8", JSON.stringify(records));
            renderList(records, "full-database");
        }
    }

    function searchByPart() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();
        renderList(records.filter(r => r.part.toLowerCase().includes(query)), "search-results");
    }

    function resetFields() {
        ['customer', 'pi', 'part', 'qty', 'ppbox', 'pallet'].forEach(id => {
            document.getElementById(id).value = "";
        });
    }

    function exportToExcel() {
        let csv = "\uFEFFDate,Customer,PI,Part,Qty,BoxID,Pallet,Status,Store_Staff,Store_Time,Laser_Staff,Laser_Time,Packing_Staff,Packing_Time,Shipped_Staff,Shipped_Time\n";
        records.forEach(r => {
            const h = r.history;
            csv += `"${r.date}","${r.cust}","${r.pi}","${r.part}","${r.qty}","${r.box}","${r.pallet||''}","${r.status}","${h.Store?.staff||''}","${h.Store?.time||''}","${h.Laser?.staff||''}","${h.Laser?.time||''}","${h.Packing?.staff||''}","${h.Packing?.time||''}","${h.Shipped?.staff||''}","${h.Shipped?.time||''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Warehouse_Trace_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
</body>
</html>
