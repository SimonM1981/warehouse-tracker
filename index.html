<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MG Warehouse - Multi-User Traceability</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --primary:#1976d2; --success:#2e7d32; --danger:#d32f2f; --bg:#f4f7f6; }
body { font-family:Arial; background:var(--bg); margin:0; }

.staff-header { background:#2196f3; color:white; padding:10px; position:sticky; top:0; }
#staff-name { width:100%; padding:10px; font-size:16px; }

.tabs { display:flex; background:#fff; }
.tab-btn { flex:1; padding:12px; border:none; cursor:pointer; }
.tab-btn.active { color:var(--primary); border-bottom:3px solid var(--primary); }

.page { display:none; padding:15px; max-width:600px; margin:auto; }
.page.active { display:block; }

.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }

.input-group { display:flex; gap:5px; }
.input-field { flex:1; padding:10px; }

button { padding:12px; border:none; color:white; font-weight:bold; cursor:pointer; }
.save-btn { background:var(--success); margin-top:15px; }

.scan-inline-btn { width:50px; }

#reader { display:none; margin-top:10px; }

.item-card { background:white; padding:10px; margin-bottom:10px; border-left:5px solid var(--primary); }
</style>
</head>

<body>

<div class="staff-header">
<label>Worker Name</label>
<input id="staff-name" placeholder="Your name">
</div>

<div class="tabs">
<button class="tab-btn active" onclick="showPage('scan-page',this)">SCAN</button>
<button class="tab-btn" onclick="showPage('list-page',this)">DATABASE</button>
</div>

<!-- SCAN -->
<div id="scan-page" class="page active">
<div class="card">

<div id="reader"></div>
<button onclick="stopScanner()" style="background:#d32f2f;margin-bottom:10px;">Stop Scan</button>

<label>Customer</label>
<div class="input-group">
<input id="customer" class="input-field">
<button onclick="startScanner('customer')" class="scan-inline-btn">📷</button>
</div>

<label>PI</label>
<div class="input-group">
<input id="pi" class="input-field">
<button onclick="startScanner('pi')" class="scan-inline-btn">📷</button>
</div>

<label>Part</label>
<div class="input-group">
<input id="part" class="input-field">
<button onclick="startScanner('part')" class="scan-inline-btn">📷</button>
</div>

<label>Qty</label>
<input id="qty" type="number" class="input-field">

<label>Box</label>
<div class="input-group">
<input id="ppbox" class="input-field">
<button onclick="startScanner('ppbox')" class="scan-inline-btn">📷</button>
</div>

<label>Pallet</label>
<input id="pallet" class="input-field">

<label>Status</label>
<select id="status" class="input-field">
<option>Store</option>
<option>Laser</option>
<option>Packing</option>
<option>Packed</option>
</select>

<button class="save-btn" onclick="saveRecord()">SAVE</button>

</div>
</div>

<!-- DATABASE -->
<div id="list-page" class="page">
<button onclick="loadRecords()" class="save-btn">LOAD DATA</button>
<div id="full-database"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1m3miMeoTWV59gIGfutPrJedCfZhCZ0Ory9yF52SRG3ubUIxW39T6o4u2NeAlSX4rpg/exec";

let html5QrCode;
let allRecords = [];

// ---------- SCANNER ----------
async function startScanner(targetId){
document.getElementById("reader").style.display="block";

if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");

await html5QrCode.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
(text)=>{
document.getElementById(targetId).value = text;
stopScanner();
});
}

function stopScanner(){
if(html5QrCode){
html5QrCode.stop();
document.getElementById("reader").style.display="none";
}
}

// ---------- NAV ----------
function showPage(id,btn){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

// ---------- SAVE ----------
async function saveRecord(){

const staff = document.getElementById("staff-name").value.trim();
if(!staff) return alert("Enter your name");

const payload = {
action:"add",
cust:customer.value,
pi:pi.value,
part:part.value,
qty:Number(qty.value)||0,
box:ppbox.value,
pallet:pallet.value||"—",
status:status.value,
staff:staff
};

if(!payload.part || !payload.box) return alert("Missing Part or Box");

try{

const res = await fetch(WEB_APP_URL,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(payload)
});

const text = await res.text();
console.log("RAW POST:",text);

const data = JSON.parse(text);

if(data.error) throw new Error(data.error);

alert("✅ Saved: " + data.message);

resetFields();

}catch(err){
alert("❌ Error: "+err.message);
console.error(err);
}
}

// ---------- LOAD ----------
async function loadRecords(){

const container = document.getElementById("full-database");
container.innerHTML = "Loading...";

try{

const res = await fetch(WEB_APP_URL);
const text = await res.text();
console.log("RAW GET:",text);

const data = JSON.parse(text);

if(data.error) throw new Error(data.error);

allRecords = data;

container.innerHTML = data.map(r=>`
<div class="item-card">
<b>${r["Part Number"]||""}</b><br>
Customer: ${r["Customer Name"]||""}<br>
Box: ${r["BOX ID"]||""}<br>
Pallet: ${r["Pallet No"]||""}<br>
Status: ${r["Current_Status"]||r["Initial Stage"]}
</div>
`).join("");

}catch(err){
container.innerHTML = "❌ Error: "+err.message;
}
}

// ---------- RESET ----------
function resetFields(){
["customer","pi","part","qty","ppbox","pallet"].forEach(id=>{
document.getElementById(id).value="";
});
}
</script>

</body>
</html>
