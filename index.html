<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1m3miMeoTWV59gIGfutPrJedCfZhCZ0Ory9yF52SRG3ubUIxW39T6o4u2NeAlSX4rpg/exec";
    let html5QrCode = null;
    let allRecords = [];

    async function startScanner(targetId) {
        const reader = document.getElementById("reader");
        const stopBtn = document.getElementById("stopBtn");

        // ✅ Check camera support
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Camera not supported on this device/browser.\n\nUse Chrome.");
            return;
        }

        reader.style.display = "block";
        stopBtn.style.display = "block";

        // ✅ Clean previous instance safely
        if (html5QrCode) {
            try {
                await html5QrCode.stop().catch(()=>{});
                html5QrCode.clear();
            } catch (e) {
                console.warn("Cleanup failed:", e);
            }
        }

        html5QrCode = new Html5Qrcode("reader");

        try {
            // ✅ Try back camera first → fallback to front
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: 250 },
                (decodedText) => {
                    document.getElementById(targetId).value = decodedText.trim();
                    stopScanner();

                    if (targetId === "searchInput") {
                        filterRecords();
                    }
                },
                (errorMessage) => {
                    console.log("Scan error:", errorMessage);
                }
            ).catch(async () => {
                // fallback camera
                await html5QrCode.start(
                    { facingMode: "user" },
                    { fps: 15, qrbox: 250 },
                    (decodedText) => {
                        document.getElementById(targetId).value = decodedText.trim();
                        stopScanner();

                        if (targetId === "searchInput") {
                            filterRecords();
                        }
                    }
                );
            });

            console.log("Scanner started for:", targetId);

        } catch (err) {
            console.error("Scanner start failed:", err);

            let msg = err.message || err;

            if (msg.includes("Permission")) {
                msg = "Camera permission denied.\n\nPlease allow camera access.";
            } else if (msg.includes("secure")) {
                msg = "Camera requires HTTPS.\n\nOpen this page via https://";
            } else if (msg.includes("NotFound")) {
                msg = "No camera found on this device.";
            }

            alert("Camera Error:\n\n" + msg);
            stopScanner();
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop()
                .then(() => {
                    document.getElementById("reader").style.display = "none";
                    document.getElementById("stopBtn").style.display = "none";
                    html5QrCode.clear();
                    html5QrCode = null;
                    console.log("Scanner stopped");
                })
                .catch(e => {
                    console.warn("Stop failed:", e);
                });
        }
    }

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if (pageId === 'records-page') loadRecords();
    }

    async function loadRecords() {
        const container = document.getElementById("records-list");
        container.innerHTML = "Loading records...";
        try {
            const url = WEB_APP_URL + "?ts=" + Date.now();
            const response = await fetch(url, { cache: "no-store" });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            allRecords = data;
            filterRecords();
        } catch (err) {
            container.innerHTML = `<p style="color:red;">Load error: ${err.message}</p>`;
        }
    }

    function filterRecords() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();
        const filtered = allRecords.filter(r => 
            (r["Part Number"] || "").toString().toLowerCase().includes(query)
        );
        renderList(filtered, "records-list");
    }

    async function saveRecord() {
        const payload = {
            action: "add",
            cust: document.getElementById("customer").value.trim() || "N/A",
            pi: document.getElementById("pi").value.trim() || "N/A",
            part: document.getElementById("part").value.trim(),
            qty: Number(document.getElementById("qty").value) || 0,
            box: document.getElementById("ppbox").value.trim(),
            pallet: document.getElementById("pallet").value.trim() || "—",
            receivedFrom: document.getElementById("receivedFrom").value,
            receivedBy: document.getElementById("receivedBy").value.trim() || "—"
        };

        if (!payload.part || !payload.box) return alert("Missing Part # or Box ID");

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            alert("Record saved successfully!");
            resetFields();
            setTimeout(loadRecords, 2000);
        } catch (err) {
            alert("Save failed: " + err.message);
        }
    }

    function resetFields() {
        ['customer','pi','part','qty','ppbox','pallet','receivedBy'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = "";
        });
        document.getElementById("receivedFrom").value = "Store";
    }

    function exportToExcel() {
        if (allRecords.length === 0) return alert("No data loaded");
        let csv = "\uFEFFTimestamp,Customer Name,PI,Part Number,QTY,BOX ID,Pallet No,Received From,Received By,Received_Time,Laser_Staff,Laser_Time,Packing_Staff,Packing_Time,Current_Status\n";
        allRecords.forEach(r => {
            csv += `"${r.Timestamp||''}","${r["Customer Name"]||''}","${r.PI||''}","${r["Part Number"]||''}","${r.QTY||''}","${r["BOX ID"]||''}","${r["Pallet No"]||''}","${r["Received From"]||''}","${r["Received By"]||''}","${r.Received_Time||''}","${r.Laser_Staff||''}","${r.Laser_Time||''}","${r.Packing_Staff||''}","${r.Packing_Time||''}","${r["Current_Status"]||''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Warehouse_Trace_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
