<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warehouse Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root { --primary: #1976d2; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 450px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; text-align: center; }
        
        label { display: block; margin-top: 12px; font-weight: 600; color: #555; font-size: 0.85rem; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; transition: opacity 0.2s; cursor: pointer; }
        button:active { opacity: 0.8; }
        
        /* Scanner UI */
        #reader { width: 100%; margin-top: 15px; border-radius: 8px; overflow: hidden; background: #000; min-height: 250px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        #stopBtn { background: var(--danger); display: none; }
        #torchBtn { background: #ffa000; display: none; }
        
        .save-btn { background: var(--success); margin-top: 20px; height: 50px; font-size: 1.1rem; }
        .result { background: #f8f9fa; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 4px solid var(--primary); }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Warehouse Tracker</h2>

    <label>Customer Name</label>
    <input id="customer" placeholder="e.g. Acme Corp">

    <label>P/I Number</label>
    <input id="pi" placeholder="Proforma Invoice #">

    <label>Part Number</label>
    <input id="part" placeholder="Part identifier">

    <label>Quantity</label>
    <input id="qty" type="number" placeholder="0">

    <label>Box ID (QR/Barcode)</label>
    <input id="ppbox" readonly placeholder="Tap scan button below...">

    <div id="reader"></div>
    
    <div class="controls">
        <button id="startBtn" onclick="startScanner()">Start Camera</button>
        <button id="stopBtn" onclick="stopScanner()">Close Camera</button>
        <button id="torchBtn" onclick="toggleTorch()">Flashlight</button>
    </div>

    <label>Status</label>
    <select id="status">
        <option>Store</option>
        <option>Laser</option>
        <option>Packing</option>
        <option>Shipped</option>
    </select>

    <button class="save-btn" onclick="saveRecord()">SAVE RECORD</button>

    <hr>
    <h3>Inventory Search</h3>
    <input id="searchPart" placeholder="Enter Part Number">
    <button onclick="searchPart()">Search History</button>
    <div id="result" class="result">Search results will appear here...</div>
</div>

<script>
    let html5QrCode;
    let isTorchOn = false;
    let records = JSON.parse(localStorage.getItem("warehouse_records") || "[]");

    async function startScanner() {
        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const torchBtn = document.getElementById("torchBtn");

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }

        startBtn.style.display = "none";
        stopBtn.style.display = "block";

        // Configuration for wide barcodes and QR
        const config = { 
            fps: 20, 
            qrbox: { width: 300, height: 200 }, // Better for 1D Barcodes
            aspectRatio: 1.0
        };

        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    document.getElementById("ppbox").value = decodedText;
                    if (navigator.vibrate) navigator.vibrate(100); // Feedback
                    stopScanner();
                }
            );
            
            // Check if flashlight is supported
            const capabilities = html5QrCode.getRunningTrackCapabilities();
            if (capabilities.torch) {
                torchBtn.style.display = "block";
            }
        } catch (err) {
            console.error(err);
            alert("Error: Ensure you are on HTTPS and allowed camera access.");
            stopScanner();
        }
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById("startBtn").style.display = "block";
                document.getElementById("stopBtn").style.display = "none";
                document.getElementById("torchBtn").style.display = "none";
                isTorchOn = false;
            });
        }
    }

    async function toggleTorch() {
        isTorchOn = !isTorchOn;
        try {
            await html5QrCode.applyVideoConstraints({
                advanced: [{ torch: isTorchOn }]
            });
        } catch (e) {
            console.log("Torch error", e);
        }
    }

    function saveRecord() {
        const data = {
            customer: document.getElementById("customer").value,
            pi: document.getElementById("pi").value,
            part: document.getElementById("part").value,
            qty: document.getElementById("qty").value,
            ppbox: document.getElementById("ppbox").value,
            status: document.getElementById("status").value,
            time: new Date().toLocaleString()
        };

        if(!data.ppbox) {
            alert("Please scan a code first!");
            return;
        }

        records.push(data);
        localStorage.setItem("warehouse_records", JSON.stringify(records));
        alert("Record Saved!");
        
        // Clear scan field for next use
        document.getElementById("ppbox").value = "";
    }

    function searchPart() {
        let p = document.getElementById("searchPart").value.trim();
        let r = records.reverse().find(x => x.part === p); // Find most recent
        let resDiv = document.getElementById("result");

        if (!r) {
            resDiv.innerHTML = "No record found for this Part Number.";
            return;
        }

        resDiv.innerHTML = `
            <strong>Last Status:</strong> ${r.status}<br>
            <strong>Customer:</strong> ${r.customer}<br>
            <strong>PI #:</strong> ${r.pi}<br>
            <strong>Box ID:</strong> ${r.ppbox}<br>
            <strong>Saved:</strong> ${r.time}
        `;
    }
</script>

</body>
</html>
