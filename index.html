<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1m3miMeoTWV59gIGfutPrJedCfZhCZ0Ory9yF52SRG3ubUIxW39T6o4u2NeAlSX4rpg/exec";
    let html5QrCode = null;
    let allRecords = [];

    async function startScanner(targetId) {
        const reader = document.getElementById("reader");
        const stopBtn = document.getElementById("stopBtn");

        reader.style.display = "block";
        stopBtn.style.display = "block";

        // ✅ FULL RESET (fix for search issue)
        if (html5QrCode) {
            try {
                await html5QrCode.stop().catch(()=>{});
                html5QrCode.clear();
            } catch (e) {}
            html5QrCode = null;
        }

        // ✅ force clean DOM (important)
        reader.innerHTML = "";

        html5QrCode = new Html5Qrcode("reader");

        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: 250 },
                (decodedText) => {
                    document.getElementById(targetId).value = decodedText.trim();

                    stopScanner();

                    // ✅ ensure search triggers
                    if (targetId === "searchInput") {
                        setTimeout(() => filterRecords(), 100);
                    }
                },
                (errorMessage) => {
                    // ignore scan errors
                }
            );

        } catch (err) {
            alert("Camera error: " + err.message);
            stopScanner();
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop()
                .then(() => {
                    html5QrCode.clear();
                    html5QrCode = null; // ✅ critical fix

                    document.getElementById("reader").style.display = "none";
                    document.getElementById("stopBtn").style.display = "none";
                })
                .catch(()=>{});
        }
    }

    function showPage(pageId, btn) {
        // ✅ stop camera when switching tab (fix)
        stopScanner();

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');

        if (pageId === 'records-page') loadRecords();
    }

    async function loadRecords() {
        const container = document.getElementById("records-list");
        container.innerHTML = "Loading records...";
        try {
            const url = WEB_APP_URL + "?ts=" + Date.now();
            const response = await fetch(url, { cache: "no-store" });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            allRecords = data;
            filterRecords();
        } catch (err) {
            container.innerHTML = `<p style="color:red;">Load error: ${err.message}</p>`;
        }
    }

    function filterRecords() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();
        const filtered = allRecords.filter(r => 
            (r["Part Number"] || "").toString().toLowerCase().includes(query)
        );
        renderList(filtered, "records-list");
    }

    async function saveRecord() {
        const payload = {
            action: "add",
            cust: document.getElementById("customer").value.trim() || "N/A",
            pi: document.getElementById("pi").value.trim() || "N/A",
            part: document.getElementById("part").value.trim(),
            qty: Number(document.getElementById("qty").value) || 0,
            box: document.getElementById("ppbox").value.trim(),
            pallet: document.getElementById("pallet").value.trim() || "—",
            receivedFrom: document.getElementById("receivedFrom").value,
            receivedBy: document.getElementById("receivedBy").value.trim() || "—"
        };

        if (!payload.part || !payload.box) return alert("Missing Part # or Box ID");

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            alert("Record saved successfully!");
            resetFields();
            setTimeout(loadRecords, 2000);
        } catch (err) {
            alert("Save failed: " + err.message);
        }
    }

    function renderList(dataArray, targetId) {
        const container = document.getElementById(targetId);
        container.innerHTML = dataArray.map(r => {
            const stages = ['Laser', 'Packing'];
            let timeline = stages.map(s => {
                const staff = r[`${s}_Staff`] || '';
                const time  = r[`${s}_Time`] || '';
                return `<div class="timeline-item ${staff ? 'done' : ''}">
                    <strong>${s}</strong>: ${staff ? `<span class="staff-badge">${staff}</span><br><span class="log-meta">${time}</span>` : 'Waiting'}
                </div>`;
            }).join('');

            const currentStatus = r["Current_Status"] || "Store";

            return `<div class="item-card">
                <strong>${r["Part Number"] || '—'}</strong>
                <span class="delete-link" onclick="alert('Delete not implemented')">Delete</span>
                <div style="font-size:0.75rem; margin:4px 0 8px;">
                    Customer: ${r["Customer Name"] || '—'}<br>
                    Box: ${r["BOX ID"] || '—'} • Pallet: ${r["Pallet No"] || '—'} • PI: ${r["PI"] || '—'}<br>
                    Received From: ${r["Received From"] || '—'} • Received By: ${r["Received By"] || '—'}
                </div>
                <div class="timeline">${timeline}</div>

                <div class="edit-row">
                    <div>
                        <label style="font-size:0.7rem;">Status (Laser or Packing only)</label>
                        <select id="status-${r.id}" class="input-field">
                            <option value="Laser" ${currentStatus==='Laser'?'selected':''}>Laser</option>
                            <option value="Packing" ${currentStatus==='Packing'?'selected':''}>Packing</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.7rem;">Box ID</label>
                        <input type="text" id="box-${r.id}" class="input-field" value="${r["BOX ID"]||''}">
                    </div>
                    <div>
                        <label style="font-size:0.7rem;">Pallet No</label>
                        <input type="text" id="pallet-${r.id}" class="input-field" value="${r["Pallet No"]||''}">
                    </div>
                </div>

                <div style="margin-top:8px;">
                    <label style="font-size:0.7rem;">Responsible Staff</label>
                    <input type="text" id="staff-${r.id}" class="input-field" placeholder="Type name here...">
                </div>

                <button onclick="saveStatusUpdate(${r.id})" class="save-btn" style="margin-top:12px;">
                    SAVE STATUS + STAFF + BOX/PALLET
                </button>
            </div>`;
        }).join('') || "<p>No records found.</p>";
    }

    async function saveStatusUpdate(rowId) {
        const staffEl = document.getElementById(`staff-${rowId}`);
        const statusEl = document.getElementById(`status-${rowId}`);
        const boxEl = document.getElementById(`box-${rowId}`);
        const palletEl = document.getElementById(`pallet-${rowId}`);

        const payload = {
            action: "update",
            rowIndex: rowId,
            status: statusEl.value,
            box: boxEl.value.trim(),
            pallet: palletEl.value.trim() || "—",
            staff: staffEl.value.trim() || "—"
        };

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            alert("Updated successfully!");
            setTimeout(loadRecords, 3000);
        } catch (err) {
            alert("Update failed: " + err.message);
        }
    }

    function resetFields() {
        ['customer','pi','part','qty','ppbox','pallet','receivedBy'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = "";
        });
        document.getElementById("receivedFrom").value = "Store";
    }

    function exportToExcel() {
        if (allRecords.length === 0) return alert("No data loaded");
        let csv = "\uFEFFTimestamp,Customer Name,PI,Part Number,QTY,BOX ID,Pallet No,Received From,Received By,Received_Time,Laser_Staff,Laser_Time,Packing_Staff,Packing_Time,Current_Status\n";
        allRecords.forEach(r => {
            csv += `"${r.Timestamp||''}","${r["Customer Name"]||''}","${r.PI||''}","${r["Part Number"]||''}","${r.QTY||''}","${r["BOX ID"]||''}","${r["Pallet No"]||''}","${r["Received From"]||''}","${r["Received By"]||''}","${r.Received_Time||''}","${r.Laser_Staff||''}","${r.Laser_Time||''}","${r.Packing_Staff||''}","${r.Packing_Time||''}","${r["Current_Status"]||''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Warehouse_Trace_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
