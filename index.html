<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1m3miMeoTWV59gIGfutPrJedCfZhCZ0Ory9yF52SRG3ubUIxW39T6o4u2NeAlSX4rpg/exec";
    let html5QrCode;
    let allRecords = [];

    async function startScanner(targetId) {
        document.getElementById("reader").style.display = "block";
        document.getElementById("stopBtn").style.display = "block";
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        try {
            if (html5QrCode.isScanning) await html5QrCode.stop();
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById(targetId).value = text.trim();
                stopScanner();
            });
        } catch (err) {
            console.error("Scanner error:", err);
        }
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                document.getElementById("reader").style.display = "none";
                document.getElementById("stopBtn").style.display = "none";
            });
        }
    }

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
        if (pageId === 'list-page') loadRecords();
    }

    async function loadRecords() {
        const container = document.getElementById("full-database");
        container.innerHTML = "Loading records from Google Sheet...";
        try {
            const response = await fetch(WEB_APP_URL);
            if (!response.ok) throw new Error(`Network error: ${response.status}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            allRecords = data;
            renderList(allRecords, "full-database");
        } catch (err) {
            container.innerHTML = `<p style="color:red;">Error loading data: ${err.message}</p>`;
            console.error("Load error:", err);
        }
    }

    async function saveRecord() {
        const staff = document.getElementById("staff-name").value.trim();
        if (!staff) return alert("Please type your name at the top!");

        const payload = {
            action: "add",
            cust: document.getElementById("customer").value.trim() || "N/A",
            pi: document.getElementById("pi").value.trim() || "N/A",
            part: document.getElementById("part").value.trim(),
            qty: Number(document.getElementById("qty").value) || 0,
            box: document.getElementById("ppbox").value.trim(),
            pallet: document.getElementById("pallet").value.trim() || "—",
            status: document.getElementById("status").value,
            staff: staff
        };

        if (!payload.part || !payload.box) return alert("Missing Part # or Box ID");

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            alert("Record saved to Google Sheet!");
            resetFields();
        } catch (err) {
            alert("Failed to save: " + err.message);
            console.error("Save error:", err);
        }
    }

    function renderList(dataArray, targetId) {
        const container = document.getElementById(targetId);
        if (!dataArray || dataArray.length === 0) {
            container.innerHTML = "<p>No records found in the sheet.</p>";
            return;
        }

        container.innerHTML = dataArray.map(r => {
            const stages = ['Store', 'Laser', 'Packing', 'Packed'];
            let timeline = stages.map(s => {
                const staffKey = s === 'Packed' ? 'Packed_Staff' : `${s}_Staff`;
                const timeKey  = s === 'Packed' ? 'Packed_Time'  : `${s}_Time`;
                const staff = r[staffKey] || '';
                const time  = r[timeKey]  || '';
                return `<div class="timeline-item ${staff ? 'done' : ''}">
                    <strong>${s}</strong>: ${staff ? `<span class="staff-badge">${staff}</span><br><span class="log-meta">${time}</span>` : 'Waiting'}
                </div>`;
            }).join('');

            const currentStatus = r["Current_Status"] || r["Initial Stage"] || "Store";

            return `<div class="item-card">
                <strong>${r["Part Number"] || '—'}</strong>
                <span class="delete-link" onclick="alert('Delete not yet implemented')">Delete</span>
                <div style="font-size:0.75rem; margin:4px 0 8px;">
                    Customer: ${r["Customer Name"] || '—'}<br>
                    Box: ${r["BOX ID"] || '—'} • Pallet: ${r["Pallet No"] || '—'} • PI: ${r["PI"] || '—'}
                </div>
                <div class="timeline">${timeline}</div>

                <div class="edit-row" style="grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px;">
                    <div>
                        <label style="font-size:0.65rem; margin-bottom:4px; display:block; color:#555;">Status</label>
                        <select id="status-${r.id}" class="input-field">
                            <option value="Store"   ${currentStatus === 'Store'   ? 'selected' : ''}>Store</option>
                            <option value="Laser"   ${currentStatus === 'Laser'   ? 'selected' : ''}>Laser</option>
                            <option value="Packing" ${currentStatus === 'Packing' ? 'selected' : ''}>Packing</option>
                            <option value="Packed"  ${currentStatus === 'Packed'  ? 'selected' : ''}>Packed</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.65rem; margin-bottom:4px; display:block; color:#555;">Box ID</label>
                        <input type="text" id="box-${r.id}" class="input-field" value="${r["BOX ID"] || ''}" placeholder="Update Box ID">
                    </div>
                    <div>
                        <label style="font-size:0.65rem; margin-bottom:4px; display:block; color:#555;">Pallet No</label>
                        <input type="text" id="pallet-${r.id}" class="input-field" value="${r["Pallet No"] || ''}" placeholder="Update Pallet">
                    </div>
                </div>

                <div class="edit-row" style="margin-top: 8px;">
                    <div style="grid-column: span 2;">
                        <label style="font-size:0.7rem; margin-bottom:4px; display:block; color:#555;">Responsible Staff</label>
                        <input type="text" id="staff-${r.id}" class="input-field" placeholder="Type name here..." value="">
                    </div>
                </div>

                <button onclick="saveStatusUpdate(${r.id})" class="save-btn" style="margin-top:12px; font-size:0.95rem; padding:10px;">
                    SAVE STATUS + STAFF + BOX/PALLET
                </button>
            </div>`;
        }).join('');
    }

    async function saveStatusUpdate(rowId) {
        const topStaff = document.getElementById("staff-name").value.trim();
        if (!topStaff) return alert("Please type your name at the top!");

        const statusEl    = document.getElementById(`status-${rowId}`);
        const boxEl       = document.getElementById(`box-${rowId}`);
        const palletEl    = document.getElementById(`pallet-${rowId}`);
        const staffEl     = document.getElementById(`staff-${rowId}`);

        const newStatus   = statusEl.value;
        const newBox      = boxEl.value.trim() || '';
        const newPallet   = palletEl.value.trim() || '';
        const responsible = staffEl.value.trim() || topStaff;

        if (!newBox) {
            return alert("Box ID cannot be empty.");
        }

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "update",
                    rowIndex: rowId,
                    status: newStatus,
                    box: newBox,
                    pallet: newPallet,
                    staff: responsible
                })
            });
            alert(`Updated:\nStatus → ${newStatus}\nBox ID → ${newBox}\nPallet → ${newPallet || '—'}\nBy ${responsible}`);
            loadRecords(); // refresh list
        } catch (err) {
            alert("Update failed: " + err.message);
            console.error("Update error:", err);
        }
    }

    function searchByPart() {
        const query = document.getElementById("searchInput").value.trim().toLowerCase();
        const filtered = allRecords.filter(r => (r["Part Number"] || "").toLowerCase().includes(query));
        renderList(filtered, "search-results");
    }

    function resetFields() {
        ['customer', 'pi', 'part', 'qty', 'ppbox', 'pallet'].forEach(id => {
            document.getElementById(id).value = "";
        });
    }

    function exportToExcel() {
        if (allRecords.length === 0) return alert("No data loaded – switch to DATABASE tab first");
        let csv = "\uFEFFTimestamp,Customer Name,PI,Part Number,QTY,BOX ID,Pallet No,Initial Stage,Store_Staff,Store_Time,Laser_Staff,Laser_Time,Packing_Staff,Packing_Time,Packed_Staff,Packed_Time,Current_Status\n";
        allRecords.forEach(r => {
            csv += `"${r.Timestamp||''}","${r["Customer Name"]||''}","${r.PI||''}","${r["Part Number"]||''}","${r.QTY||''}","${r["BOX ID"]||''}","${r["Pallet No"]||''}","${r["Initial Stage"]||''}","${r.Store_Staff||''}","${r.Store_Time||''}","${r.Laser_Staff||''}","${r.Laser_Time||''}","${r.Packing_Staff||''}","${r.Packing_Time||''}","${r.Packed_Staff||''}","${r.Packed_Time||''}","${r["Current_Status"]||r["Initial Stage"]||''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Warehouse_Trace_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
